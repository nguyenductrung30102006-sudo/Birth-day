<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎁 Quà Sinh Nhật Bí Mật 🎂</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      .gift {
        font-size: 140px;
        cursor: pointer;
        animation: shake 0.8s infinite;
        transition: 0.5s;
      }

      @keyframes shake {
        0% {
          transform: rotate(-8deg);
        }
        25% {
          transform: rotate(8deg);
        }
        50% {
          transform: rotate(-8deg);
        }
        75% {
          transform: rotate(8deg);
        }
        100% {
          transform: rotate(-8deg);
        }
      }

      .gift:hover {
        transform: scale(1.1);
      }

      .text {
        color: white;
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
      }

      .message {
        display: none;
        text-align: center;
        color: white;
        animation: fadeIn 2s;
      }

      .message h1 {
        font-size: 60px;
      }

      .message p {
        font-size: 26px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .confetti {
        position: absolute;
        font-size: 35px;
        top: -50px;
        animation: fall linear infinite;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh);
        }
      }
    </style>
  </head>
  <body>
    <audio id="music" loop>
      <source src="the_mountain-happy-birthday-508020.mp3" type="audio/mpeg" />
    </audio>

    <div id="gift" class="gift">🎁</div>
    <div id="hint" class="text">Nhấn vào hộp quà để mở 🎉</div>

    <div id="message" class="message">
      <h1>🎂 HAPPY BIRTHDAY 🎂</h1>

      <p>
        Chúc cô gái sinh nhật vui vẻ! 🎉<br /><br />

        Tuổi mới luôn mạnh khỏe 💪<br />
        Học tập và công việc thành công 📚<br />
        Gặp nhiều may mắn 🍀<br />
        Và luôn mỉm cười mỗi ngày 😊
      </p>
    </div>

    <script>
      const gift = document.getElementById("gift");
      const hint = document.getElementById("hint");
      const message = document.getElementById("message");
      const music = document.getElementById("music");

      gift.addEventListener("click", function () {
        music.play();

        gift.style.display = "none";
        hint.style.display = "none";

        message.style.display = "block";

        for (let i = 0; i < 100; i++) {
          let c = document.createElement("div");

          c.className = "confetti";

          const icons = ["🎉", "🎊", "✨", "🎈", "🎂", "🎁"];

          c.innerHTML = icons[Math.floor(Math.random() * icons.length)];

          c.style.left = Math.random() * 100 + "vw";

          c.style.animationDuration = 3 + Math.random() * 5 + "s";

          document.body.appendChild(c);
        }
      });
    </script>
  </body>
</html>
